<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학동아리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정 (환경 변수 자동 연동)
        const firebaseConfig = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // 데이터 경로 (보안 규칙의 경로와 일치해야 합니다)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'applications');

        // 제출 로직
        document.getElementById('applyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const studentId = document.getElementById('studentId').value;
            const name = document.getElementById('name').value;
            const motivation = document.getElementById('motivation').value;
            
            try {
                // 중복 검사
                const q = query(colRef, where("studentId", "==", studentId));
                const snapshot = await getDocs(q);
                
                if (!snapshot.empty) {
                    alert('이미 지원하신 학번입니다.');
                    return;
                }

                // 저장
                await addDoc(colRef, {
                    name, studentId, motivation,
                    timestamp: new Date().toLocaleString()
                });
                alert('지원서가 성공적으로 제출되었습니다!');
                this.reset();
            } catch (error) {
                console.error(error);
                alert('제출 실패: 권한 설정을 확인하세요 (Firestore Rules)');
            }
        });

        // 관리자 모드 (엑셀 다운로드)
        window.openAdmin = async () => {
            const pw = prompt("관리자 비밀번호:");
            if (pw !== "admin1234") return alert("비밀번호 불일치");
            
            try {
                const snapshot = await getDocs(colRef);
                let csv = "성명,학번,지원동기,제출일시\n";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    csv += `"${d.name}","${d.studentId}","${d.motivation}","${d.timestamp}"\n`;
                });
                
                const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "수학동아리_지원자목록.csv";
                link.click();
            } catch (e) { alert("데이터 로드 실패"); }
        };
    </script>
</head>
<body class="bg-slate-50">
    <div class="max-w-4xl mx-auto p-6">
        <nav class="text-right py-4">
            <button onclick="openAdmin()" class="text-gray-400 hover:text-indigo-600">관리자 모드</button>
        </nav>
        
        <header class="bg-indigo-700 text-white p-12 rounded-2xl text-center shadow-xl">
            <h1 class="text-5xl font-bold mb-4">수학동아리</h1>
            <p class="text-xl opacity-90">논리적 사고로 세상을 설계하는 즐거운 수학 여행</p>
        </header>

        <section id="apply" class="mt-12 bg-white p-8 rounded-2xl shadow-lg">
            <h2 class="text-2xl font-bold mb-6">입단 지원서</h2>
            <form id="applyForm" class="space-y-4">
                <input type="text" id="name" placeholder="성명" class="w-full p-3 border rounded-lg" required>
                <input type="text" id="studentId" placeholder="학번 (예: 20101)" class="w-full p-3 border rounded-lg" required>
                <textarea id="motivation" placeholder="지원 동기" class="w-full p-3 border rounded-lg" rows="4" required></textarea>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-lg hover:bg-indigo-800">제출하기</button>
            </form>
        </section>
    </div>
</body>
</html>
