<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학동아리 신청 관리</title>
    <!-- Firebase SDK 로드 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDlkGukYR90Dq9pVBTceGITyr7ETxfJNvg",
            authDomain: "math-club-application.firebaseapp.com",
            projectId: "math-club-application",
            storageBucket: "math-club-application.firebasestorage.app",
            messagingSenderId: "73557118596",
            appId: "1:73557118596:web:d0a78880eb590673627cd1",
            measurementId: "G-3HJ652Z4EN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 신청서 제출 이벤트
        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "applications"), {
                    school: document.getElementById('school').value,
                    studentId: document.getElementById('studentId').value,
                    name: document.getElementById('name').value,
                    motivation: document.getElementById('motivation').value,
                    timestamp: new Date()
                });
                alert("신청이 완료되었습니다!");
                document.getElementById('applyForm').reset();
            } catch (e) {
                alert("오류 발생: " + e.message);
            }
        });

        // 엑셀 다운로드
        window.downloadExcel = async () => {
            try {
                const querySnapshot = await getDocs(collection(db, "applications"));
                let csv = "학교,학번,성명,지원동기\n";
                querySnapshot.forEach((doc) => {
                    const d = doc.data();
                    csv += `${d.school},${d.studentId},${d.name},"${d.motivation.replace(/"/g, '""')}"\n`;
                });
                const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "신청명단.csv";
                link.click();
            } catch (e) {
                alert("데이터를 가져오는 중 오류가 발생했습니다: " + e.message);
            }
        };
    </script>
    <style>
        body { font-family: 'Pretendard', sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .form-card, .admin-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .admin-section { display: none; }
    </style>
</head>
<body>

    <div class="form-card" id="applySection">
        <h2>수학동아리 신청</h2>
        <form id="applyForm">
            <div class="input-group"><label>학교</label><input type="text" id="school" required></div>
            <div class="input-group"><label>학번</label><input type="text" id="studentId" required></div>
            <div class="input-group"><label>성명</label><input type="text" id="name" required></div>
            <div class="input-group"><label>지원동기</label><textarea id="motivation" required></textarea></div>
            <button type="submit">신청 제출하기</button>
        </form>
    </div>

    <button onclick="document.getElementById('adminSection').style.display='block'" style="background: #666; font-size: 12px; padding: 5px; border: none; color: white; cursor: pointer;">관리자 로그인</button>

    <div class="admin-section" id="adminSection">
        <div class="admin-card">
            <h2>관리자 모드</h2>
            <input type="password" id="adminPass" placeholder="관리자 비밀번호">
            <button onclick="if(document.getElementById('adminPass').value==='1234') document.getElementById('adminControls').style.display='block'; else alert('비밀번호 오류');">로그인</button>
            <div id="adminControls" style="display:none; margin-top:20px;">
                <button onclick="downloadExcel()" style="background: #28a745;">엑셀(CSV)로 다운로드</button>
            </div>
        </div>
    </div>
</body>
</html>
